<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="text-center mb-4">Registro y Control de Prospectos Comerciales</h2>
        
        <div class="row">
            <div class="col-md-5 mb-4">
                <div class="card p-4 shadow-sm">
                    <h4 class="mb-3">Nuevo Prospecto</h4>
                    
                    <div id="mensaje-alerta"></div>

                    <form id="formulario-prospecto">
                        <div class="mb-3">
                            <label class="form-label">Nombre:</label>
                            <input type="text" id="campo-nombre" class="form-control" placeholder="Nombre del cliente">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Categoría o Tipo:</label>
                            <select id="campo-categoria" class="form-select">
                                <option value="">-- Seleccione una opción --</option>
                                <option value="Cliente VIP">Cliente VIP</option>
                                <option value="Cliente Frecuente">Cliente Frecuente</option>
                                <option value="Nuevo Prospecto">Nuevo Prospecto</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <textarea id="campo-descripcion" class="form-control" rows="3" placeholder="Detalles o requerimientos..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Registrar Cliente</button>
                    </form>
                </div>
            </div>

            <div class="col-md-7">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Lista de Clientes Registrados</h4>
                    <span class="badge bg-secondary p-2 fs-6">
                        Total: <span id="contador-total">0</span>
                    </span>
                </div>

                <div id="contenedor-lista"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
